services: 
  api:
    image: tnomcibw4/fastapi 
    depends_on:
      - postgres
    ports:
      - "80:8000"
    env_file:
      - ./.env
  
    #command: sh -c "sleep 5 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:13
    env_file:
      - ./.env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  