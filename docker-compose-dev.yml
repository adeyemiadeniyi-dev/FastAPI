services: 
  api:
    build: .
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      - ./.env.docker
    volumes:
      - ./:/app
    command: sh -c "sleep 10 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:13
    env_file:
      - ./.env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  